{% extends 'partials/base.html' %}

{% block title %}Desactivar Membership{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-3">Desactivar membership</h4>
        <p class="text-muted">Se desactivará el membership <strong>{{ object }}</strong>. Esta acción retira el acceso operativo del módulo según este rol.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Desactivar</button>
            <a href="{% url 'fotocopiadora:menu_fotocopiadora' %}" class="btn btn-light">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
