<!-- Modal Editar Cargo -->
<form method="post" action="{% url 'accounts:cargo_editar' object.pk %}">
    {% csrf_token %}
    <div class="modal-header">
        <h5 class="modal-title">
            <i class="ri-user-settings-line me-1"></i>Editar Cargo: {{ object.nombre }}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
    </div>
    <div class="modal-body">
        {% if form.errors %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>Error:</strong> Por favor corrija los errores en el formulario.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <div class="row g-3">
            <div class="col-md-12">
                <label for="{{ form.nombre.id_for_label }}" class="form-label">Nombre <span class="text-danger">*</span></label>
                {{ form.nombre }}
                {% if form.nombre.errors %}
                <div class="invalid-feedback d-block">{{ form.nombre.errors|first }}</div>
                {% endif %}
            </div>
            <div class="col-md-6">
                <div class="form-check form-switch">
                    {{ form.activo }}
                    <label class="form-check-label" for="{{ form.activo.id_for_label }}">Activo</label>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary">
            <i class="ri-save-line me-1"></i>Guardar Cambios
        </button>
    </div>
</form>
