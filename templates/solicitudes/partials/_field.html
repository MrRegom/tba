{# Renderizado reutilizable de un campo de formulario #}
{# Uso: {% include 'solicitudes/partials/_field.html' with field=form.campo required=True help_text="Texto" col="col-md-12" %} #}
<div class="{{ col|default:'col-md-12' }}">
    <label for="{{ field.id_for_label }}" class="form-label">
        {{ field.label }}{% if required %} <span class="text-danger">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {{ field.errors }}
        </div>
    {% endif %}
    {% if help_text %}<small class="text-muted">{{ help_text }}</small>{% endif %}
</div>
